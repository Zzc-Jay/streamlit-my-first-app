name: Deploy to VPS

on:
  push:
    branches: [ main ]   # 改成你的默认分支

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/streamlit-my-first-app
            git pull origin main || { echo "❌ git pull 失败，终止部署"; exit 1; }
            source ./one/venv/bin/activate
            pip install -r ./one/requirements.txt --quiet
            sudo systemctl restart streamlit.service
            echo "部署完成，Streamlit 服务已重启"
